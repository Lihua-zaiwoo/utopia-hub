version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./data/utopia.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-utopia2026}
      - NEXT_PUBLIC_SITE_NAME=Utopia Hub
    volumes:
      - uploads_data:/app/uploads
      - db_data:/app/data
    restart: unless-stopped

volumes:
  uploads_data:
  db_data:
